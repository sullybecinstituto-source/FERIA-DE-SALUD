<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SullyBec Instituto - Gestión Clínica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .section-title { border-left: 4px solid #059669; padding-left: 1rem; margin-bottom: 1.5rem; margin-top: 2rem; color: #1e293b; font-weight: 700; text-transform: uppercase; font-size: 0.875rem; letter-spacing: 0.05em; }
        .checkbox-pill { display: flex; align-items: center; padding: 0.6rem 0.8rem; border-radius: 0.5rem; border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; font-weight: 500; background-color: white; }
        .checkbox-pill:hover { background-color: #f8fafc; }
        input[type="checkbox"]:checked + span { color: #059669; font-weight: 700; }
        .tab-active { border-bottom: 4px solid #059669; color: #059669; }
        .animate-pop { animation: popIn 0.3s ease-out forwards; }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center overflow-x-auto">
            <button onclick="switchTab('triage')" id="btn-triage" class="flex-none px-6 py-4 font-bold text-xs uppercase tracking-wider tab-active">📝 Registro</button>
            <button onclick="switchTab('consultas')" id="btn-consultas" class="flex-none px-6 py-4 font-bold text-xs uppercase tracking-wider text-slate-400">🔍 Consultas</button>
            <button onclick="switchTab('papelera')" id="btn-papelera" class="flex-none px-6 py-4 font-bold text-xs uppercase tracking-wider text-slate-400">🗑️ Papelera</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <section id="tab-triage">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-emerald-700 uppercase">SullyBec Instituto</h1>
                <p class="text-slate-500 font-medium italic">Feria de Salud Integral 2026</p>
            </div>

            <form id="clinicForm" class="bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-slate-200">
                <h2 class="section-title">1. Ficha de Identificación</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold mb-1">Nombre Completo</label>
                        <input type="text" name="nombre" required class="w-full border-2 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Edad</label>
                        <input type="number" name="edad" required class="w-full border-2 rounded-lg p-2.5 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Género</label>
                        <select name="genero" class="w-full border-2 rounded-lg p-2.5 outline-none bg-white">
                            <option value="Femenino">Femenino</option>
                            <option value="Masculino">Masculino</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Teléfono</label>
                        <input type="tel" name="telefono" class="w-full border-2 rounded-lg p-2.5 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold mb-1">Colonia</label>
                        <input type="text" name="colonia" required class="w-full border-2 rounded-lg p-2.5 outline-none">
                    </div>
                </div>

                <h2 class="section-title text-red-600 border-red-600">2. Signos Vitales</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-red-50 p-4 rounded-xl">
                    <input type="text" name="alergias" placeholder="Alergias..." class="w-full border-2 p-3 rounded-lg mb-4">

                <button type="button" onclick="guardarRegistro()" class="w-full mt-6 bg-emerald-600 text-white font-bold py-5 rounded-2xl shadow-lg hover:bg-emerald-700 text-xl uppercase tracking-widest">
                    💾 Guardar Registro
                </button>
            </form>
        </section>

        <section id="tab-consultas" class="hidden">
            <h2 class="text-2xl font-bold mb-4">Pacientes en Tiempo Real</h2>
            <div id="lista-pacientes" class="grid grid-cols-1 gap-4"></div>
        </section>

        <section id="tab-papelera" class="hidden">
            <h2 class="text-2xl font-bold mb-4">Papelera</h2>
            <div id="lista-papelera" class="grid grid-cols-1 gap-4"></div>
        </section>
    </div>

    <div id="modal-detalle" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl p-6 relative animate-pop overflow-y-auto max-h-[90vh]">
            <button onclick="cerrarModal()" class="absolute top-4 right-4 text-3xl text-slate-400">×</button>
            <div id="detalle-content"></div>
            <div class="mt-6 flex gap-3">
                <button onclick="cerrarModal()" class="flex-1 bg-slate-200 py-3 rounded-xl font-bold">Cerrar</button>
                <button onclick="guardarEvolucion()" class="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-bold">Guardar Evolución</button>
            </div>
        </div>
    </div>

    <div id="modal-success" class="hidden fixed inset-0 bg-black/70 z-[200] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center animate-pop">
            <div class="text-5xl mb-4">✅</div>
            <h3 class="text-2xl font-bold mb-4">¡REGISTRO GUARDADO!</h3>
            <button onclick="cerrarSuccess()" class="w-full py-4 bg-emerald-600 text-white rounded-xl font-bold uppercase">Continuar</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdeZG8-SX37MVIa2HcH_MRlPyu1eRrd-U",
            authDomain: "feriadesaludsullybec.firebaseapp.com",
            databaseURL: "https://feriadesaludsullybec-default-rtdb.firebaseio.com",
            projectId: "feriadesaludsullybec",
            storageBucket: "feriadesaludsullybec.firebasestorage.app",
            messagingSenderId: "223306485224",
            appId: "1:223306485224:web:00fd9103e788e7a362a85d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const dbRef = ref(db, 'registros');

        const SERVICIOS = ["Masaje Terapéutico", "Acupuntura", "Ventosas", "Quiropráctica", "Desintoxicación Iónica", "Nutrición", "Biomagnetismo", "Corte de Cabello"];
        let registrosGlobales = [];
        let pacienteSeleccionadoId = null;

        // Cargar Servicios en el formulario
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('pref-list');
            container.innerHTML = SERVICIOS.map(s => `
                <label class="checkbox-pill">
                    <input type="checkbox" name="servicio_pref" value="${s}" class="mr-3 h-5 w-5">
                    <span>${s}</span>
                </label>
            `).join('');
        });

        // Sincronización en tiempo real con Firebase
        onValue(dbRef, (snapshot) => {
            const data = snapshot.val();
            registrosGlobales = data ? Object.keys(data).map(key => ({...data[key], firebaseId: key})) : [];
            registrosGlobales.sort((a, b) => b.id - a.id);
            actualizarListasUI();
        });

        window.guardarRegistro = function() {
            const form = document.getElementById('clinicForm');
            if (!form.checkValidity()) { alert("⚠️ Completa los campos"); return; }
            
            const fd = new FormData(form);
            const registro = {
                id: Date.now(),
                fecha: new Date().toLocaleString('es-MX'),
                nombre: fd.get('nombre').toUpperCase(),
                edad: fd.get('edad'),
                genero: fd.get('genero'),
                telefono: fd.get('telefono') || 'S/N',
                colonia: fd.get('colonia'),
                presion: fd.get('presion'),
                frecuencia: fd.get('frecuencia'),
                temperatura: fd.get('temperatura'),
                alergias: fd.get('alergias') || "Ninguna",
                motivo: fd.get('motivo') || "",
                servicios_pref: Array.from(fd.getAll('servicio_pref')),
                evolucion: "",
                borrado: false
            };

            push(dbRef, registro).then(() => {
                form.reset();
                document.getElementById('modal-success').classList.remove('hidden');
            });
        };

        function actualizarListasUI() {
            const activos = registrosGlobales.filter(r => !r.borrado);
            const borrados = registrosGlobales.filter(r => r.borrado);
            
            document.getElementById('lista-pacientes').innerHTML = activos.map(r => renderCard(r)).join('');
            document.getElementById('lista-papelera').innerHTML = borrados.map(r => renderCard(r, true)).join('');
        }

        function renderCard(r, esPapelera = false) {
            return `
                <div class="bg-white p-4 rounded-xl border-l-8 ${esPapelera ? 'border-slate-300' : 'border-emerald-500'} shadow-sm flex justify-between items-center cursor-pointer animate-pop" onclick="verDetalle(${r.id})">
                    <div>
                        <h3 class="font-bold uppercase text-slate-800">${r.nombre}</h3>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">${r.colonia} • ${r.edad} AÑOS</p>
                    </div>
                    <div class="flex gap-2">
                        ${esPapelera ? 
                            `<button onclick="event.stopPropagation(); restaurar(${r.id})" class="text-[10px] bg-emerald-50 text-emerald-600 p-1 px-2 rounded font-bold">Restaurar</button>` : 
                            `<button onclick="event.stopPropagation(); moverPapelera(${r.id})" class="text-slate-300">🗑️</button>`
                        }
                    </div>
                </div>
            `;
        }

        window.verDetalle = function(id) {
            pacienteSeleccionadoId = id;
            const r = registrosGlobales.find(reg => reg.id === id);
            document.getElementById('detalle-content').innerHTML = `
                <h2 class="text-2xl font-black uppercase mb-1">${r.nombre}</h2>
                <p class="text-emerald-600 font-bold mb-4">📞 ${r.telefono}</p>
                <div class="grid grid-cols-3 gap-2 mb-4">
                    <div class="bg-slate-50 p-2 rounded text-center"><p class="text-[9px] uppercase">Presión</p><b>${r.presion}</b></div>
                    <div class="bg-slate-50 p-2 rounded text-center"><p class="text-[9px] uppercase">Temp</p><b>${r.temperatura}°</b></div>
                    <div class="bg-slate-50 p-2 rounded text-center"><p class="text-[9px] uppercase">Edad</p><b>${r.edad}</b></div>
                </div>
                <div class="mb-4">
                    <p class="text-xs font-bold uppercase text-slate-400">Motivo:</p>
                    <p class="text-sm border-l-4 border-blue-400 pl-2 italic">${r.motivo || 'S/D'}</p>
                </div>
                <div class="mb-4">
                    <p class="text-xs font-bold uppercase text-slate-400">Seguimiento Clínico:</p>
                    <textarea id="evolucion-texto" rows="4" class="w-full border p-2 rounded-xl mt-2 text-sm" placeholder="Anotar resultados del tratamiento...">${r.evolucion || ''}</textarea>
                </div>
            `;
            document.getElementById('modal-detalle').classList.remove('hidden');
        };

        window.guardarEvolucion = function() {
            const texto = document.getElementById('evolucion-texto').value;
            const r = registrosGlobales.find(reg => reg.id === pacienteSeleccionadoId);
            if (r) {
                update(ref(db, `registros/${r.firebaseId}`), { evolucion: texto });
                cerrarModal();
            }
        };

        window.moverPapelera = function(id) {
            const r = registrosGlobales.find(reg => reg.id === id);
            if (r) update(ref(db, `registros/${r.firebaseId}`), { borrado: true });
        };

        window.restaurar = function(id) {
            const r = registrosGlobales.find(reg => reg.id === id);
            if (r) update(ref(db, `registros/${r.firebaseId}`), { borrado: false });
        };

        window.switchTab = function(tab) {
            ['triage', 'consultas', 'papelera'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
                document.getElementById(`btn-${t}`).classList.toggle('tab-active', t === tab);
            });
        };

        window.cerrarModal = () => document.getElementById('modal-detalle').classList.add('hidden');
        window.cerrarSuccess = () => { document.getElementById('modal-success').classList.add('hidden'); switchTab('consultas'); };
    </script>
</body>
</html>
