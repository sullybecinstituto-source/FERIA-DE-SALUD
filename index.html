<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SullyBec Instituto - Gestión Clínica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .section-title { border-left: 4px solid #059669; padding-left: 1rem; margin-bottom: 1.5rem; margin-top: 2rem; color: #1e293b; font-weight: 700; text-transform: uppercase; font-size: 0.875rem; letter-spacing: 0.05em; }
        .checkbox-pill { display: flex; align-items: center; padding: 0.5rem 0.7rem; border-radius: 0.5rem; border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s; font-size: 0.85rem; }
        .checkbox-pill:hover { background-color: #f8fafc; border-color: #059669; }
        input[type="checkbox"]:checked + span { color: #059669; font-weight: 700; }
        .tab-active { border-bottom: 4px solid #059669; color: #059669; }
        .animate-pop { animation: popIn 0.3s ease-out forwards; }
        @keyframes popIn { 0% { transform: scale(0.95); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center overflow-x-auto">
            <button onclick="switchTab('triage')" id="btn-triage" class="flex-none px-6 py-4 font-bold text-xs uppercase tracking-wider tab-active">📝 Registro</button>
            <button onclick="switchTab('consultas')" id="btn-consultas" class="flex-none px-6 py-4 font-bold text-xs uppercase tracking-wider text-slate-400">🔍 Consultas</button>
            <button onclick="switchTab('papelera')" id="btn-papelera" class="flex-none px-6 py-4 font-bold text-xs uppercase tracking-wider text-slate-400">🗑️ Papelera</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <section id="tab-triage">
            <div class="text-center mb-8 flex flex-col items-center">
                <img src="https://i.ibb.co/Xz9gLgM/Sullybec-Instituto-Logo.png" alt="SullyBec Instituto" class="h-32 w-auto mb-4 drop-shadow-md">
                <h1 class="text-3xl font-bold text-emerald-700 uppercase">SullyBec Instituto</h1>
                <p class="text-slate-500 font-medium italic">Feria de Salud 2026</p>
            </div>

            <form id="clinicForm" class="bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-slate-200">
                <h2 class="section-title">1. Ficha de Identificación</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Nombre Completo</label>
                        <input type="text" name="nombre" required class="w-full border-slate-200 border-2 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Edad</label>
                        <input type="number" name="edad" required class="w-full border-slate-200 border-2 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Sexo / Género</label>
                        <select name="genero" class="w-full border-slate-200 border-2 rounded-lg p-2.5 outline-none bg-white">
                            <option value="Femenino">Femenino</option>
                            <option value="Masculino">Masculino</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Teléfono</label>
                        <input type="tel" name="telefono" required class="w-full border-slate-200 border-2 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Colonia</label>
                        <input type="text" name="colonia" required class="w-full border-slate-200 border-2 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                    </div>
                </div>

                <h2 class="section-title text-red-600 border-red-600">2. Signos Vitales</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-red-50 p-4 rounded-xl">
                    <input type="text" name="presion" placeholder="P. Arterial" required class="border-2 p-2 rounded-lg outline-none">
                    <input type="number" name="frecuencia" placeholder="F. Cardiaca" required class="border-2 p-2 rounded-lg outline-none">
                    <input type="number" step="0.1" name="temperatura" placeholder="Temp °C" required class="border-2 p-2 rounded-lg outline-none">
                </div>

                <h2 class="section-title text-orange-600 border-orange-600">3. Antecedentes</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="space-y-3">
                        <label class="checkbox-pill bg-white border-orange-100 text-sm"><input type="checkbox" name="antecedente" value="Diabetes" class="mr-2"><span>Diabetes</span></label>
                        <label class="checkbox-pill bg-white border-orange-100 text-sm"><input type="checkbox" name="antecedente" value="Hipertensión" class="mr-2"><span>Hipertensión</span></label>
                        <div class="flex items-center gap-2">
                            <label class="checkbox-pill bg-white border-orange-100 text-sm flex-1"><input type="checkbox" name="antecedente" value="Embarazo" class="mr-2"><span>Embarazo</span></label>
                            <input type="number" name="meses_embarazo" placeholder="Meses" class="w-20 border-2 p-2 rounded-lg text-xs outline-none">
                        </div>
                    </div>
                    <div class="space-y-3">
                        <input type="text" name="alergias" class="w-full border-2 p-2 rounded-lg text-sm outline-none" placeholder="Alergias">
                        <textarea name="medicamentos" rows="2" class="w-full border-2 p-2 rounded-lg text-sm outline-none" placeholder="Medicamentos que toma"></textarea>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-8">
                    <div>
                        <h2 class="section-title text-blue-600 border-blue-600">4. Interés</h2>
                        <div id="interes-list" class="space-y-2 bg-blue-50/50 p-4 rounded-xl border border-blue-100"></div>
                    </div>
                    <div>
                        <h2 class="section-title text-emerald-600 border-emerald-600">5. Aplicado</h2>
                        <div id="aplicado-list" class="space-y-2 bg-emerald-50/50 p-4 rounded-xl border border-emerald-100"></div>
                    </div>
                </div>

                <button type="button" onclick="guardarRegistro()" class="w-full mt-10 bg-emerald-600 text-white font-bold py-6 rounded-2xl shadow-lg hover:bg-emerald-700 transition-all text-xl uppercase tracking-widest">
                    💾 Guardar Registro
                </button>
            </form>
        </section>

        <section id="tab-consultas" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-800 uppercase tracking-tight">Pacientes Activos</h2>
                <button onclick="descargarExcel()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-bold text-[10px] hover:bg-blue-700 transition-all uppercase flex items-center gap-2">
                    📊 Descargar Excel
                </button>
            </div>
            <div id="lista-pacientes" class="grid grid-cols-1 gap-4"></div>
        </section>

        <section id="tab-papelera" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-slate-600 uppercase tracking-tight">Papelera / Historial</h2>
                <button onclick="vaciarPapelera()" class="bg-red-100 text-red-600 px-4 py-2 rounded-lg font-bold text-[10px] hover:bg-red-200 transition-all uppercase">🗑️ Vaciar Papelera</button>
            </div>
            <div id="lista-papelera" class="grid grid-cols-1 gap-4"></div>
        </section>
    </div>

    <div id="modal-detalle" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl max-h-[90vh] overflow-hidden flex flex-col animate-pop shadow-2xl">
            <div id="detalle-content" class="overflow-y-auto p-8 flex-1"></div>
            <div class="p-6 bg-slate-50 border-t flex gap-4">
                <button onclick="cerrarModal()" class="flex-1 bg-slate-200 py-4 rounded-2xl font-bold uppercase text-slate-700">Cerrar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdeZG8-SX37MVIa2HcH_MRlPyu1eRrd-U",
            authDomain: "feriadesaludsullybec.firebaseapp.com",
            projectId: "feriadesaludsullybec",
            storageBucket: "feriadesaludsullybec.firebasestorage.app",
            messagingSenderId: "223306485224",
            appId: "1:223306485224:web:00fd9103e788e7a362a85d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let dataGlobal = [];
        const PASS_MAESTRA = "Sully2026";

        const TERAPIAS = ["Masaje Terapéutico", "Acupuntura", "Ventosas", "Quiropráctica", "Desintoxicación Iónica", "Nutrición", "Biomagnetismo", "Corte de Cabello"];

        window.addEventListener('DOMContentLoaded', () => {
            const interesCont = document.getElementById('interes-list');
            const aplicadoCont = document.getElementById('aplicado-list');
            const html = TERAPIAS.map(t => `<label class="checkbox-pill bg-white flex"><input type="checkbox" name="serv_temp" data-val="${t}" value="${t}" class="mr-3 h-5 w-5"><span class="text-sm">${t}</span></label>`).join('');
            interesCont.innerHTML = html.replace(/serv_temp/g, 'servicio_interes');
            aplicadoCont.innerHTML = html.replace(/serv_temp/g, 'servicio_aplicado');
            escucharDatos();
        });

        window.guardarRegistro = function() {
            const form = document.getElementById('clinicForm');
            if (!form.checkValidity()) { alert("⚠️ Completa los datos obligatorios."); return; }
            const fd = new FormData(form);
            const nuevoID = Date.now().toString();
            const registro = {
                id: nuevoID,
                fecha: new Date().toLocaleString(),
                nombre: fd.get('nombre').toUpperCase(),
                edad: fd.get('edad'),
                telefono: fd.get('telefono'),
                colonia: fd.get('colonia').toUpperCase(),
                genero: fd.get('genero'),
                presion: fd.get('presion'),
                frecuencia: fd.get('frecuencia'),
                temperatura: fd.get('temperatura'),
                antecedentes: Array.from(fd.getAll('antecedente')),
                meses_embarazo: fd.get('meses_embarazo') || "0",
                medicamentos: fd.get('medicamentos') || "Ninguno",
                alergias: fd.get('alergias') || "Ninguna",
                servicios_interes: Array.from(fd.getAll('servicio_interes')),
                servicios_aplicados: Array.from(fd.getAll('servicio_aplicado')),
                borrado: false
            };
            set(ref(db, 'pacientes/' + nuevoID), registro).then(() => { 
                form.reset(); 
                alert("✅ Guardado con éxito"); 
                switchTab('consultas');
            });
        };

        function escucharDatos() {
            onValue(ref(db, 'pacientes'), (snapshot) => {
                const data = snapshot.val();
                dataGlobal = data ? Object.values(data) : [];
                actualizarUI();
            });
        }

        function actualizarUI() {
            const activos = dataGlobal.filter(r => !r.borrado).sort((a, b) => b.id - a.id);
            const borrados = dataGlobal.filter(r => r.borrado).sort((a, b) => b.id - a.id);
            document.getElementById('lista-pacientes').innerHTML = activos.length ? activos.map(r => renderCard(r, false)).join('') : '<p class="text-center py-10 text-slate-400 italic text-sm">No hay pacientes activos.</p>';
            document.getElementById('lista-papelera').innerHTML = borrados.length ? borrados.map(r => renderCard(r, true)).join('') : '<p class="text-center py-10 text-slate-400 italic text-sm">Papelera vacía.</p>';
        }

        function renderCard(r, esPapelera) {
            const tieneAlertas = (r.antecedentes && r.antecedentes.length > 0) || (r.alergias && r.alergias !== "Ninguna" && r.alergias !== "");
            return `
            <div class="bg-white p-5 rounded-2xl border-l-8 ${tieneAlertas ? 'border-red-500 bg-red-50/10' : 'border-emerald-500'} shadow-sm mb-4 animate-pop hover:shadow-md transition-all">
                <div class="flex justify-between items-start" onclick="verDetalle('${r.id}')">
                    <div class="flex-1 cursor-pointer">
                        <h3 class="font-bold text-slate-800 text-lg uppercase">${r.nombre} ${tieneAlertas ? '⚠️' : ''}</h3>
                        <p class="text-[11px] font-bold text-slate-500 uppercase">📞 ${r.telefono} • COL: ${r.colonia}</p>
                        <div class="mt-3 flex flex-wrap gap-1">
                            ${(r.servicios_aplicados || []).map(s => `<span class="text-[9px] bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full font-bold uppercase">${s}</span>`).join('') || '<span class="text-[9px] bg-slate-100 text-slate-400 px-2 py-0.5 rounded-full font-bold uppercase">En espera</span>'}
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-4">
                        <span class="text-[10px] text-slate-300 font-medium">${r.fecha ? r.fecha.split(',')[1] || r.fecha : ''}</span>
                        <button onclick="event.stopPropagation(); moverAPapelera('${r.id}', ${!esPapelera})" class="p-2 bg-slate-50 rounded-xl hover:bg-slate-200 transition-colors">
                            ${esPapelera ? '🔄' : '🗑️'}
                        </button>
                    </div>
                </div>
            </div>`;
        }

        window.descargarExcel = function() {
            const password = prompt("Introduce la contraseña para descargar el reporte:");
            if (password === PASS_MAESTRA) {
                if (dataGlobal.length === 0) { alert("No hay datos para exportar."); return; }
                
                // Preparar datos para Excel (aplanar arrays)
                const excelData = dataGlobal.map(r => ({
                    ID: r.id,
                    Fecha: r.fecha,
                    Nombre: r.nombre,
                    Edad: r.edad,
                    Genero: r.genero,
                    Telefono: r.telefono,
                    Colonia: r.colonia,
                    Presion: r.presion,
                    Frecuencia: r.frecuencia,
                    Temperatura: r.temperatura,
                    Antecedentes: r.antecedentes ? r.antecedentes.join(", ") : "",
                    Gestacion_Meses: r.meses_embarazo,
                    Alergias: r.alergias,
                    Medicamentos: r.medicamentos,
                    Interes_Servicios: r.servicios_interes ? r.servicios_interes.join(", ") : "",
                    Terapias_Aplicadas: r.servicios_aplicados ? r.servicios_aplicados.join(", ") : "",
                    Estado: r.borrado ? "Papelera" : "Activo"
                }));

                const ws = XLSX.utils.json_to_sheet(excelData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Pacientes_Feria_Salud");
                XLSX.writeFile(wb, `Reporte_SullyBec_${new Date().toLocaleDateString()}.xlsx`);
                alert("📊 Reporte generado con éxito.");
            } else if (password !== null) {
                alert("❌ Contraseña incorrecta.");
            }
        };

        window.verDetalle = function(id) {
            const r = dataGlobal.find(reg => reg.id === id);
            if (!r) return;
            const content = document.getElementById('detalle-content');
            content.innerHTML = `
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-3xl font-black uppercase text-emerald-700">${r.nombre}</h2>
                    <span class="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full">${r.fecha}</span>
                </div>
                <div class="grid grid-cols-2 gap-6 mb-8 text-sm bg-slate-50 p-6 rounded-2xl">
                    <p><b>EDAD:</b> ${r.edad} años</p><p><b>GÉNERO:</b> ${r.genero}</p><p><b>TEL:</b> ${r.telefono}</p><p><b>COLONIA:</b> ${r.colonia}</p>
                </div>
                <div class="grid grid-cols-3 gap-4 mb-8 text-center">
                    <div class="p-3 bg-red-50 rounded-xl border border-red-100"><p class="text-[10px] font-bold text-red-400 uppercase">Presión</p><p class="font-black text-red-700">${r.presion}</p></div>
                    <div class="p-3 bg-red-50 rounded-xl border border-red-100"><p class="text-[10px] font-bold text-red-400 uppercase">Frecuencia</p><p class="font-black text-red-700">${r.frecuencia}</p></div>
                    <div class="p-3 bg-red-50 rounded-xl border border-red-100"><p class="text-[10px] font-bold text-red-400 uppercase">Temp</p><p class="font-black text-red-700">${r.temperatura}°C</p></div>
                </div>
                <div class="space-y-4">
                    <div class="p-4 border-2 border-orange-100 rounded-2xl bg-orange-50/30">
                        <h4 class="text-xs font-black text-orange-700 uppercase mb-2">Salud y Antecedentes</h4>
                        <p class="text-sm"><b>Antecedentes:</b> ${r.antecedentes.join(', ') || 'Ninguno'}</p>
                        ${r.meses_embarazo !== "0" ? `<p class="text-sm"><b>Gestación:</b> ${r.meses_embarazo} meses</p>` : ''}
                        <p class="text-sm"><b>Alergias:</b> ${r.alergias}</p><p class="text-sm"><b>Medicamentos:</b> ${r.medicamentos}</p>
                    </div>
                    <div class="p-4 border-2 border-emerald-200 rounded-2xl bg-emerald-50">
                        <h4 class="text-xs font-black text-emerald-800 uppercase mb-2">Terapias Aplicadas</h4>
                        <p class="text-base font-bold text-emerald-900">${r.servicios_aplicados.join(', ') || 'PENDIENTE DE APLICAR'}</p>
                    </div>
                </div>`;
            document.getElementById('modal-detalle').classList.remove('hidden');
        };

        window.vaciarPapelera = function() {
            const password = prompt("Introduce la contraseña para vaciar permanentemente:");
            if (password === PASS_MAESTRA) {
                const borrados = dataGlobal.filter(r => r.borrado);
                if (borrados.length === 0) { alert("La papelera ya está vacía."); return; }
                if (confirm(`¿Eliminar definitivamente ${borrados.length} registros? Esta acción no se puede deshacer.`)) {
                    borrados.forEach(r => remove(ref(db, 'pacientes/' + r.id)));
                    alert("🗑️ Papelera vaciada.");
                }
            } else if (password !== null) {
                alert("❌ Contraseña incorrecta.");
            }
        };

        window.moverAPapelera = (id, estado) => update(ref(db, 'pacientes/' + id), { borrado: estado });
        
        window.switchTab = (tab) => {
            ['triage', 'consultas', 'papelera'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
                document.getElementById(`btn-${t}`).classList.toggle('tab-active', t === tab);
                document.getElementById(`btn-${t}`).classList.toggle('text-slate-400', t !== tab);
            });
        };

        window.cerrarModal = () => document.getElementById('modal-detalle').classList.add('hidden');
    </script>
</body>
</html>
