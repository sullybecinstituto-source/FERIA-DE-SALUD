<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SullyBec Instituto - Gestión Clínica Feria</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .section-title { border-left: 4px solid #059669; padding-left: 1rem; margin-bottom: 1.5rem; margin-top: 2rem; color: #1e293b; font-weight: 700; text-transform: uppercase; font-size: 0.875rem; letter-spacing: 0.05em; }
        .checkbox-pill { display: flex; align-items: center; padding: 0.6rem 0.8rem; border-radius: 0.5rem; border: 1px solid #e2e8f0; cursor: pointer; transition: all 0.2s; font-size: 0.9rem; font-weight: 500; }
        .checkbox-pill:hover { background-color: #f8fafc; }
        input[type="checkbox"]:checked + span { color: #059669; font-weight: 700; }
        .tab-active { border-bottom: 4px solid #059669; color: #059669; }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .animate-pop { animation: popIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center overflow-x-auto">
            <button onclick="switchTab('triage')" id="btn-triage" class="flex-none px-6 py-4 font-bold text-xs uppercase tracking-wider tab-active">📝 Registro</button>
            <button onclick="switchTab('consultas')" id="btn-consultas" class="flex-none px-6 py-4 font-bold text-xs uppercase tracking-wider text-slate-400">🔍 Consultas</button>
            <button onclick="switchTab('papelera')" id="btn-papelera" class="flex-none px-6 py-4 font-bold text-xs uppercase tracking-wider text-slate-400">🗑️ Papelera</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-4 md:p-8">
        <section id="tab-triage">
            <div class="text-center mb-8 flex flex-col items-center">
                <img src="https://i.postimg.cc/85bFw63Z/logo-sullybec.png" alt="SullyBec Instituto" class="h-32 w-auto mb-4 drop-shadow-md">
                <h1 class="text-3xl font-bold text-emerald-700 uppercase">SullyBec Instituto</h1>
                <p class="text-slate-500 font-medium italic">Feria de Salud 2026 - Sincronizado</p>
            </div>

            <form id="clinicForm" class="bg-white rounded-2xl shadow-xl p-6 md:p-10 border border-slate-200">
                <h2 class="section-title">1. Ficha de Identificación</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Nombre Completo</label>
                        <input type="text" name="nombre" required class="w-full border-slate-200 border-2 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Edad</label>
                        <input type="number" name="edad" required class="w-full border-slate-200 border-2 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Sexo / Género</label>
                        <select name="genero" class="w-full border-slate-200 border-2 rounded-lg p-2.5 outline-none bg-white">
                            <option value="Femenino">Femenino</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Teléfono</label>
                        <input type="tel" name="telefono" required class="w-full border-slate-200 border-2 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1">Colonia</label>
                        <input type="text" name="colonia" required class="w-full border-slate-200 border-2 rounded-lg p-2.5 outline-none focus:border-emerald-500">
                    </div>
                </div>

                <h2 class="section-title text-red-600 border-red-600">2. Signos Vitales</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 bg-red-50 p-4 rounded-xl">
                    <input type="text" name="presion" placeholder="P. Arterial (120/80)" required class="border-2 p-2 rounded-lg outline-none">
                    <input type="number" name="frecuencia" placeholder="F. Cardiaca (lpm)" required class="border-2 p-2 rounded-lg outline-none">
                    <input type="number" step="0.1" name="temperatura" placeholder="Temp (°C)" required class="border-2 p-2 rounded-lg outline-none">
                </div>

                <h2 class="section-title text-orange-600 border-orange-600">3. Antecedentes y Salud</h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-6">
                    <div class="space-y-3">
                        <label class="checkbox-pill bg-white border-orange-100 text-sm"><input type="checkbox" name="antecedente" value="Diabetes" class="mr-2"><span>Diabetes</span></label>
                        <label class="checkbox-pill bg-white border-orange-100 text-sm"><input type="checkbox" name="antecedente" value="Hipertensión" class="mr-2"><span>Hipertensión</span></label>
                        <label class="checkbox-pill bg-white border-orange-100 text-sm"><input type="checkbox" name="antecedente" value="Cáncer" class="mr-2"><span>Cáncer</span></label>
                        <label class="checkbox-pill bg-white border-orange-100 text-sm"><input type="checkbox" name="antecedente" value="Embarazo" class="mr-2"><span>Embarazo</span></label>
                    </div>
                    <div class="space-y-3">
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Medicamentos que toma:</label>
                        <textarea name="medicamentos" rows="2" class="w-full border-2 p-2 rounded-lg text-sm outline-none focus:border-orange-400" placeholder="Lista de medicamentos..."></textarea>
                        
                        <label class="block text-xs font-bold text-slate-500 uppercase mt-2 mb-1">Alergias:</label>
                        <input type="text" name="alergias" class="w-full border-2 p-2 rounded-lg text-sm outline-none focus:border-orange-400" placeholder="¿A qué es alérgico?">
                    </div>
                </div>

                <h2 class="section-title">4. Servicios</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="p-4 border rounded-xl bg-emerald-50 border-emerald-100">
                        <p class="text-xs font-bold mb-4 uppercase text-emerald-800">Servicios Aplicados:</p>
                        <div id="rec-list" class="grid grid-cols-1 gap-2"></div>
                    </div>
                    <textarea name="motivo" rows="4" placeholder="Observaciones adicionales..." class="w-full border-2 p-3 rounded-lg outline-none focus:border-emerald-500 bg-slate-50/30"></textarea>
                </div>

                <button type="button" onclick="guardarRegistro()" class="w-full mt-10 bg-emerald-600 text-white font-bold py-6 rounded-2xl shadow-lg hover:bg-emerald-700 transition-all text-xl uppercase tracking-widest">
                    💾 Guardar en la Nube
                </button>
            </form>
        </section>

        <section id="tab-consultas" class="hidden">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Pacientes Registrados</h2>
            <div id="lista-pacientes" class="grid grid-cols-1 gap-4"></div>
        </section>

        <section id="tab-papelera" class="hidden">
            <h2 class="text-2xl font-bold text-slate-600 mb-6">Papelera</h2>
            <div id="lista-papelera" class="grid grid-cols-1 gap-4"></div>
        </section>
    </div>

    <div id="modal-success" class="hidden fixed inset-0 bg-black/70 z-[300] flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-3xl max-w-sm w-full text-center animate-pop">
            <div class="text-6xl mb-4">✅</div>
            <h3 class="text-2xl font-black mb-8 uppercase">¡Guardado con Éxito!</h3>
            <button onclick="cerrarSuccess()" class="w-full py-4 bg-emerald-600 text-white rounded-2xl font-bold">Continuar</button>
        </div>
    </div>

    <div id="modal-detalle" class="hidden fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-3xl max-h-[95vh] overflow-hidden flex flex-col animate-pop">
            <div id="detalle-content" class="overflow-y-auto p-6 flex-1"></div>
            <div class="p-6 bg-slate-50 border-t">
                <button onclick="cerrarModal()" class="w-full bg-slate-200 py-4 rounded-2xl font-bold uppercase">Cerrar</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAdeZG8-SX37MVIa2HcH_MRlPyu1eRrd-U",
            authDomain: "feriadesaludsullybec.firebaseapp.com",
            projectId: "feriadesaludsullybec",
            storageBucket: "feriadesaludsullybec.firebasestorage.app",
            messagingSenderId: "223306485224",
            appId: "1:223306485224:web:00fd9103e788e7a362a85d",
            measurementId: "G-NN1DMXNLED"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let dataGlobal = [];

        const SERVICIOS = ["Masaje Terapéutico", "Acupuntura", "Ventosas", "Quiropráctica", "Desintoxicación Iónica", "Nutrición", "Biomagnetismo", "Corte de Cabello"];

        window.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('rec-list');
            container.innerHTML = SERVICIOS.map(s => `
                <label class="checkbox-pill bg-white">
                    <input type="checkbox" name="servicio_rec" value="${s}" class="mr-3 h-5 w-5">
                    <span class="text-base">${s}</span>
                </label>
            `).join('');
            escucharDatos();
        });

        window.guardarRegistro = function() {
            const form = document.getElementById('clinicForm');
            if (!form.checkValidity()) { alert("⚠️ Por favor llena los campos obligatorios"); return; }
            
            const fd = new FormData(form);
            const nuevoID = Date.now().toString();
            
            const registro = {
                id: nuevoID,
                fecha: new Date().toLocaleString(),
                nombre: fd.get('nombre').toUpperCase(),
                edad: fd.get('edad'),
                telefono: fd.get('telefono'),
                colonia: fd.get('colonia'),
                genero: fd.get('genero'),
                presion: fd.get('presion'),
                frecuencia: fd.get('frecuencia'),
                temperatura: fd.get('temperatura'),
                antecedentes: Array.from(fd.getAll('antecedente')),
                medicamentos: fd.get('medicamentos') || "Ninguno",
                alergias: fd.get('alergias') || "Ninguna",
                servicios_rec: Array.from(fd.getAll('servicio_rec')),
                motivo: fd.get('motivo') || "",
                borrado: false
            };

            set(ref(db, 'pacientes/' + nuevoID), registro)
                .then(() => {
                    form.reset();
                    document.getElementById('modal-success').classList.remove('hidden');
                });
        };

        function escucharDatos() {
            onValue(ref(db, 'pacientes'), (snapshot) => {
                const data = snapshot.val();
                dataGlobal = data ? Object.values(data) : [];
                actualizarUI();
            });
        }

        function actualizarUI() {
            const activos = dataGlobal.filter(r => !r.borrado).reverse();
            const borrados = dataGlobal.filter(r => r.borrado).reverse();

            document.getElementById('lista-pacientes').innerHTML = activos.map(r => renderCard(r, false)).join('');
            document.getElementById('lista-papelera').innerHTML = borrados.map(r => renderCard(r, true)).join('');
        }

        function renderCard(r, esPapelera) {
            return `
                <div class="bg-white p-5 rounded-2xl border-l-8 border-emerald-500 shadow-sm animate-pop">
                    <div class="flex justify-between items-start cursor-pointer" onclick="verDetalle('${r.id}')">
                        <div>
                            <h3 class="font-bold text-slate-800 text-lg uppercase">${r.nombre}</h3>
                            <div class="text-[11px] font-bold text-slate-500 uppercase">
                                📞 ${r.telefono} | 🏠 COL: ${r.colonia} | 🎂 ${r.edad} AÑOS
                            </div>
                        </div>
                        <div class="flex gap-2">
                             <button onclick="event.stopPropagation(); moverAPapelera('${r.id}', ${!esPapelera})" class="text-xl">
                                ${esPapelera ? '🔄' : '🗑️'}
                            </button>
                        </div>
                    </div>
                </div>`;
        }

        window.verDetalle = function(id) {
            const r = dataGlobal.find(reg => reg.id === id);
            const content = document.getElementById('detalle-content');
            content.innerHTML = `
                <h2 class="text-2xl font-black uppercase text-emerald-700">${r.nombre}</h2>
                <div class="grid grid-cols-2 gap-4 mt-4 text-sm">
                    <p><b>Edad:</b> ${r.edad}</p>
                    <p><b>Tel:</b> ${r.telefono}</p>
                    <p><b>Colonia:</b> ${r.colonia}</p>
                    <p><b>Presión:</b> ${r.presion}</p>
                </div>
                <div class="mt-6 p-4 bg-orange-50 rounded-xl">
                    <p class="font-bold text-orange-800">Medicamentos:</p>
                    <p>${r.medicamentos}</p>
                    <p class="font-bold text-orange-800 mt-2">Antecedentes:</p>
                    <p>${r.antecedentes.join(', ') || 'Ninguno'}</p>
                </div>
                <div class="mt-4 p-4 bg-emerald-50 rounded-xl">
                    <p class="font-bold text-emerald-800">Tratamiento Aplicado:</p>
                    <p>${r.servicios_rec.join(', ')}</p>
                    <p class="mt-2"><b>Observaciones:</b> ${r.motivo}</p>
                </div>
            `;
            document.getElementById('modal-detalle').classList.remove('hidden');
        };

        window.moverAPapelera = function(id, estado) {
            update(ref(db, 'pacientes/' + id), { borrado: estado });
        };

        window.switchTab = (tab) => {
            ['triage', 'consultas', 'papelera'].forEach(t => {
                document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
                document.getElementById(`btn-${t}`).classList.toggle('tab-active', t === tab);
            });
        };
        window.cerrarSuccess = () => document.getElementById('modal-success').classList.add('hidden');
        window.cerrarModal = () => document.getElementById('modal-detalle').classList.add('hidden');
    </script>
</body>
</html>
